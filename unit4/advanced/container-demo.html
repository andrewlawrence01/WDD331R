<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Query Demo</title>

    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/unit4/advanced/container-demo.css">
</head>

<body>

<main class="page">

    <section class="layout-wide">
        <h2>Wide Context</h2>
        <div class="container">
            <article class="feature">
                <img src="https://picsum.photos/seed/a/200/200" alt="">
                <div>
                    <h3>Adaptive Component</h3>
                    <p>This layout changes in wide containers.</p>
                </div>
            </article>
        </div>
    </section>

    <aside class="layout-narrow">
        <h2>Narrow Context</h2>
        <div class="container">
            <article class="feature">
                <img src="https://picsum.photos/seed/b/200/200" alt="">
                <div>
                    <h3>Adaptive Component</h3>
                    <p>This layout stacks in narrow containers.</p>
                </div>
            </article>
        </div>
    </aside>

</main>

</body>
</html>
