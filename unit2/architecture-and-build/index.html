<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Lawrence – WDD 331R Advanced CSS</title>

    <link rel="stylesheet" href="unit2/architecture-and-build/css/main.css">
    <script src="unit2/architecture-and-build/js/theme-preference.js"></script>
    <link rel="stylesheet" href="unit2/architecture-and-build/css/dist/styles.css">
<details class="theme-menu">
    <summary class="theme-control">
        <span class="visually-hidden">
            Color scheme
        </span>
    </summary>

    <div
        class="theme-extra"
        role="group"
        aria-label="Choose color scheme"
    >
        <label
            class="theme-control theme-pick"
            data-theme-pick="light"
        >
            <input
                name="theme-preference"
                type="radio"
                value="light"
            >

            <span aria-hidden="true">
                &#9788;&#65039;
            </span>

            <span class="visually-hidden">
                Light
            </span>
        </label>

        <label
            class="theme-control theme-pick"
            data-theme-pick="system"
        >
            <input
                name="theme-preference"
                type="radio"
                value="system"
                checked
            >

            <span aria-hidden="true">
                &#9881;&#65039;
            </span>

            <span class="visually-hidden">
                System default
            </span>
        </label>

        <label
            class="theme-control theme-pick"
            data-theme-pick="dark"
        >
            <input
                name="theme-preference"
                type="radio"
                value="dark"
            >

            <span aria-hidden="true">
                &#127766;
            </span>

            <span class="visually-hidden">
                Dark
            </span>
        </label>
    </div>
</details>
</head>

<body>
    <header class="site-header">
        <h1>Andrew Lawrence</h1>
        <p>WDD 331R – Advanced CSS Practice Site</p>
    </header>

    <main class="site-main">
        <section>
            <h2>Assignments & Projects</h2>

            <div class="assignment-grid">
                <article class="assignment-card">
                    <h3>Custom Properties and Nesting</h3>

                    <p>
                        A responsive ward activity board built using
                        CSS custom properties, clamp(), calc(),
                        and native CSS nesting.
                    </p>

                    <a href="unit2/layered-components/index.html">
                        View Project →
                    </a>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
